<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Student Detail</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
<style>
    body { background-color: #f5f5f5; }
    .profile-img {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 50%;
        border: 4px solid #007bff;
    }
    .profile-placeholder {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        background-color: #dee2e6;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        color: #6c757d;
        border: 4px solid #007bff;
        margin: auto;
    }
</style>
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark px-4">
    <a class="navbar-brand" href="#">Student Management System</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="btn btn-primary btn-sm" th:href="@{/students}">Back to Students</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-md-9">
            <div class="card shadow p-4">

                <!-- Photo -->
                <div class="text-center mb-4">
                    <img th:if="${student.photoPath}"
                         th:src="@{'/uploads/photos/' + ${student.photoPath}}"
                         class="profile-img">
                    <div th:unless="${student.photoPath}" class="profile-placeholder mx-auto">
                        <span th:text="${#strings.substring(student.firstName, 0, 1)}"></span>
                    </div>
                </div>

                <!-- Name -->
                <h3 class="text-center" th:text="${student.firstName + ' ' + student.lastName}"></h3>
                <p class="text-center text-muted" th:text="${student.email}"></p>

                <hr>

                <!-- Details -->
                <div class="row mt-3">
                    <div class="col-md-6 mb-3">
                        <div class="card bg-light p-3">
                            <small class="text-muted">First Name</small>
                            <strong th:text="${student.firstName}"></strong>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card bg-light p-3">
                            <small class="text-muted">Last Name</small>
                            <strong th:text="${student.lastName}"></strong>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card bg-light p-3">
                            <small class="text-muted">Email</small>
                            <strong th:text="${student.email}"></strong>
                        </div>
                    </div>
                    <div class="col-md-6 mb-3">
                        <div class="card bg-light p-3">
                            <small class="text-muted">Gender</small>
                            <strong th:text="${student.gender != null ? student.gender : '—'}"></strong>
                        </div>
                    </div>
                </div>

                <!-- Courses -->
                <div class="mt-2">
                    <h5>Enrolled Courses</h5>
                    <div th:if="${#sets.isEmpty(student.courses)}">
                        <span class="text-muted">No courses assigned yet.</span>
                    </div>
                    <div th:each="course : ${student.courses}" class="mb-2">
                        <span class="badge badge-primary p-2" style="font-size:14px;"
                              th:text="${course.courseName + ' (' + course.courseCode + ')'}"></span>
                    </div>
                </div>

                <hr>

                <!-- Action buttons -->
                <!-- Action buttons -->
<div class="text-center mt-2">
    <a th:href="@{/students}" class="btn btn-primary">Back to Students</a>
</div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
