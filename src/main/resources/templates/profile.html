<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>My Profile</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
<style>
    body { background-color: #f5f5f5; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark px-4">
    <a class="navbar-brand" href="#">Student Management System</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav align-items-center ml-auto">
            <li class="nav-item mr-3">
                <a class="btn btn-primary btn-sm" th:href="@{/students}">Students</a>
            </li>
            <li class="nav-item">
                <a class="btn btn-danger" th:href="@{/logout}">Logout</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-lg-6 col-md-8 col-sm-10">
            <div class="card shadow p-4">

                <h3 class="text-center mb-4">My Profile</h3>

                <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

                <form th:action="@{/profile}" method="post">

                    <div class="form-group">
                        <label>Email (cannot be changed)</label>
                        <input type="email" class="form-control" th:value="${user.email}" readonly>
                    </div>

                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username" class="form-control" th:value="${user.username}" required>
                    </div>

                    <div class="form-group">
                        <label>New Password (leave blank to keep current)</label>
                        <input type="password" name="newPassword" class="form-control" placeholder="New password">
                    </div>

                    <div class="form-group">
                        <label>Security Question</label>
                        <select name="securityQuestion" class="form-control">
                            <option value="">-- keep current --</option>
                            <option value="What is your pet's name?">What is your pet's name?</option>
                            <option value="What is your city of birth?">What is your city of birth?</option>
                            <option value="What is your favorite teacher's name?">What is your favorite teacher's name?</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Security Answer</label>
                        <input type="text" name="securityAnswer" class="form-control" placeholder="Leave blank to keep current">
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary px-4">Save Changes</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
