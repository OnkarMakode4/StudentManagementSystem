<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Dashboard</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
    body { background-color: #f5f5f5; }
    .stat-card { border-radius: 10px; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark px-4">
    <a class="navbar-brand" href="#">Student Management System</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav align-items-center ml-auto">

            <li class="nav-item mr-3">
                <a class="btn btn-primary btn-sm" th:href="@{/students}">Students</a>
            </li>

            <li class="nav-item mr-3">
                <a class="btn btn-info btn-sm" th:href="@{/announcements}">📢 Announcements</a>
            </li>

            <li class="nav-item mr-3" sec:authorize="hasRole('ADMIN')">
                <a class="btn btn-warning btn-sm" th:href="@{/courses}">Manage Courses</a>
            </li>

            <li class="nav-item mr-3">
                <a class="btn btn-secondary btn-sm" th:href="@{/profile}">My Profile</a>
            </li>

            <li class="nav-item">
                <a class="btn btn-danger btn-sm" th:href="@{/logout}">Logout</a>
            </li>

        </ul>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center mb-4">Dashboard</h2>

    <div class="row mb-4">
        <div class="col-md-3 col-sm-6 mb-3">
            <div class="card stat-card text-white bg-primary shadow">
                <div class="card-body text-center">
                    <h6>Total Students</h6>
                    <h2 th:text="${totalStudents}"></h2>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 mb-3">
            <div class="card stat-card text-white bg-success shadow">
                <div class="card-body text-center">
                    <h6>Total Courses</h6>
                    <h2 th:text="${totalCourses}"></h2>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 mb-3">
            <div class="card stat-card text-white bg-info shadow">
                <div class="card-body text-center">
                    <h6>With Photo</h6>
                    <h2 th:text="${withPhoto}"></h2>
                </div>
            </div>
        </div>
        <div class="col-md-3 col-sm-6 mb-3">
            <div class="card stat-card text-white bg-secondary shadow">
                <div class="card-body text-center">
                    <h6>Without Photo</h6>
                    <h2 th:text="${withoutPhoto}"></h2>
                </div>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-md-6 mb-4">
            <div class="card shadow p-3">
                <h5 class="text-center">Gender Breakdown</h5>
                <canvas id="genderChart"></canvas>
            </div>
        </div>
        <div class="col-md-6 mb-4">
            <div class="card shadow p-3">
                <h5 class="text-center">Students per Course</h5>
                <canvas id="courseChart"></canvas>
            </div>
        </div>
    </div>

</div>

<script th:inline="javascript">
    const genderLabels = /*[[${genderLabels}]]*/ [];
    const genderValues = /*[[${genderValues}]]*/ [];
    const courseLabels = /*[[${courseLabels}]]*/ [];
    const courseValues = /*[[${courseValues}]]*/ [];

    new Chart(document.getElementById('genderChart'), {
        type: 'pie',
        data: {
            labels: genderLabels,
            datasets: [{
                data: genderValues,
                backgroundColor: ['#007bff', '#28a745', '#ffc107', '#6c757d']
            }]
        },
        options: { responsive: true }
    });

    new Chart(document.getElementById('courseChart'), {
        type: 'bar',
        data: {
            labels: courseLabels,
            datasets: [{
                label: 'Students',
                data: courseValues,
                backgroundColor: '#17a2b8'
            }]
        },
        options: {
            responsive: true,
            scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
        }
    });
</script>

</body>
</html>
