<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Courses</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark px-4">
    <a class="navbar-brand" href="#">Student Management System</a>
</nav>

<div class="container mt-4">
    <h2>Courses</h2>

    <a th:href="@{/students}" class="btn btn-secondary btn-sm mb-3">Back to Students</a>
    <a th:href="@{/courses/new}" class="btn btn-primary btn-sm mb-3">Add Course</a>

    <table class="table table-striped table-bordered">
        <thead>
            <tr>
                <th>Course Name</th>
                <th>Course Code</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="course : ${courses}">
                <td th:text="${course.courseName}"></td>
                <td th:text="${course.courseCode}"></td>
                <td><a th:href="@{/courses/{id}(id=${course.id})}" class="btn btn-danger btn-sm">Delete</a></td>
            </tr>
        </tbody>
    </table>
</div>

</body>
</html>
