<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
<meta charset="UTF-8">
<title>Announcements</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
<style>
    body { background-color: #f5f5f5; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark px-4">
    <a class="navbar-brand" href="#">Student Management System</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto align-items-center">
            <li class="nav-item mr-3">
                <a class="btn btn-primary btn-sm" th:href="@{/students}">Students</a>
            </li>
            <li class="nav-item mr-3">
                <a class="btn btn-primary btn-sm" th:href="@{/dashboard}">Dashboard</a>
            </li>
            <li class="nav-item">
                <a class="btn btn-danger btn-sm" th:href="@{/logout}">Logout</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center">📢 Announcements</h2>

    <div th:if="${successMessage}" class="alert alert-success mt-3" th:text="${successMessage}"></div>

    <!-- Post new announcement — ADMIN only -->
    <div class="card shadow p-4 mt-3 mb-4" sec:authorize="hasRole('ADMIN')">
        <h5>Post New Announcement</h5>
        <form th:action="@{/announcements}" th:object="${newAnnouncement}" method="post">
            <div class="form-group">
                <label>Title</label>
                <input type="text" th:field="*{title}" class="form-control" placeholder="Announcement title" required>
            </div>
            <div class="form-group">
                <label>Message</label>
                <textarea th:field="*{message}" class="form-control" rows="3" placeholder="Write your announcement..." required></textarea>
            </div>
            <button type="submit" class="btn btn-success">Post Announcement</button>
        </form>
    </div>

    <!-- List of announcements -->
    <div th:if="${#lists.isEmpty(announcements)}" class="alert alert-info">
        No announcements yet.
    </div>

    <div th:each="announcement : ${announcements}" class="card shadow mb-3">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <strong th:text="${announcement.title}"></strong>
            <small th:text="${#temporals.format(announcement.postedAt, 'dd MMM yyyy, hh:mm a')}"></small>
        </div>
        <div class="card-body">
            <p class="card-text" th:text="${announcement.message}"></p>
            <small class="text-muted">Posted by: <span th:text="${announcement.postedBy}"></span></small>
        </div>
        <div class="card-footer text-right" sec:authorize="hasRole('ADMIN')">
            <a th:href="@{/announcements/delete/{id}(id=${announcement.id})}"
               class="btn btn-danger btn-sm"
               onclick="return confirm('Delete this announcement?')">Delete</a>
        </div>
    </div>

</div>

</body>
</html>
