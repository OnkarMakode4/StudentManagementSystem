<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Create Student</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
<style>
    body { background-color: #f5f5f5; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark">
    <a class="navbar-brand" href="#">Student Management System</a>
    <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#collapsibleNavbar">
        <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="collapsibleNavbar">
       <ul class="navbar-nav">
           <li class="nav-item"><a class="nav-link" th:href="@{/students}">  Student Management</a></li>
       </ul>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="col-lg-6 col-md-8 col-sm-10 my-4">
            <div class="card shadow p-4">

                <h3 class="text-center mb-4">Create New Student</h3>

                <form th:action="@{/students}" th:object="${student}" method="post" enctype="multipart/form-data">

                    <div class="form-group">
                        <label>Student First Name</label>
                        <input type="text" th:field="*{firstName}" class="form-control"
                               th:classappend="${#fields.hasErrors('firstName')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}" th:errors="*{firstName}"></div>
                    </div>

                    <div class="form-group">
                        <label>Student Last Name</label>
                        <input type="text" th:field="*{lastName}" class="form-control"
                               th:classappend="${#fields.hasErrors('lastName')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></div>
                    </div>

                    <div class="form-group">
                        <label>Student Email</label>
                        <input type="text" th:field="*{email}" class="form-control"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'">
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <select th:field="*{gender}" class="form-control"
                                th:classappend="${#fields.hasErrors('gender')} ? 'is-invalid'">
                            <option value="" disabled selected>Select Gender</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Other">Other</option>
                        </select>
                        <div class="invalid-feedback" th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}"></div>
                    </div>

                    <div class="form-group">
                        <label>Student Photo</label>
                        <input type="file" name="photo" class="form-control-file" accept="image/*">
                    </div>

                    <div class="form-group">
                        <label>Courses</label>
                        <div th:each="course : ${allCourses}" class="form-check">
                            <input type="checkbox" class="form-check-input" name="courseIds" th:value="${course.id}">
                            <label class="form-check-label" th:text="${course.courseName} + ' (' + ${course.courseCode} + ')'"></label>
                        </div>
                        <small th:if="${#lists.isEmpty(allCourses)}" class="text-muted">
                            No courses yet — add some from "Manage Courses".
                        </small>
                    </div>

                    <div class="text-center">
                        <button type="submit" class="btn btn-primary px-4">Submit</button>
                    </div>

                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
