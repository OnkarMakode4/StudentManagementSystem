<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Mark Attendance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark px-4">
    <a class="navbar-brand" href="#">Student Management System</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="btn btn-primary btn-sm" th:href="@{/students}">Back to Students</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-4">
    <h2 class="text-center">Mark Attendance</h2>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="card shadow p-4 mt-3">
        <form th:action="@{/attendance}" method="post">

            <div class="form-group">
                <label><strong>Date</strong></label>
                <input type="date" name="date" class="form-control" th:value="${today}" required>
            </div>

            <table class="table table-bordered mt-3">
                <thead class="thead-dark">
                    <tr>
                        <th>Student Name</th>
                        <th>Email</th>
                        <th>Present</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="student : ${students}">
                        <td th:text="${student.firstName + ' ' + student.lastName}"></td>
                        <td th:text="${student.email}"></td>
                        <td>
                            <input type="checkbox" name="presentIds" th:value="${student.id}">
                        </td>
                    </tr>
                </tbody>
            </table>

            <div class="text-center">
                <button type="submit" class="btn btn-success px-4">Save Attendance</button>
            </div>

        </form>
    </div>
</div>

</body>
</html>
