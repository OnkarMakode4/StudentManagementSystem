<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Reset Password</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
<style>
    body { background-color: #f5f5f5; }
</style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center align-items-center" style="height: 100vh;">
        <div class="col-lg-5 col-md-7 col-sm-9">
            <div class="card shadow p-4">

                <h3 class="text-center mb-4">Reset Password</h3>

                <p th:if="${error}" class="text-danger text-center" th:text="${error}"></p>

                <form th:action="@{/reset-password}" method="post">
                    <input type="hidden" name="email" th:value="${email}">

                    <label th:text="${securityQuestion}"></label>
                    <input type="text" name="securityAnswer" class="form-control mb-3" placeholder="Your answer" required>

                    <label>New Password</label>
                    <input type="password" name="newPassword" class="form-control mb-3" placeholder="New password" required>

                    <button class="btn btn-primary btn-block">Reset Password</button>
                </form>

            </div>
        </div>
    </div>
</div>

</body>
</html>
