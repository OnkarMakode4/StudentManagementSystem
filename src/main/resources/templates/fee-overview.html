<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Fee Overview</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
<style>
    body { background-color: #f5f5f5; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark px-4">
    <a class="navbar-brand" href="#">Student Management System</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item mr-3">
                <a class="btn btn-primary btn-sm" th:href="@{/students}">Students</a>
            </li>
            <li class="nav-item">
                <a class="btn btn-danger btn-sm" th:href="@{/logout}">Logout</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-4">

    <h2 class="text-center">💰 Fee Overview — All Students</h2>

    <table class="table table-bordered table-striped mt-4">
        <thead class="thead-dark">
            <tr>
                <th>Student Name</th>
                <th>Email</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="student : ${students}">
                <td th:text="${student.firstName + ' ' + student.lastName}"></td>
                <td th:text="${student.email}"></td>
                <td>
                    <a th:href="@{/fees/student/{id}(id=${student.id})}"
                       class="btn btn-info btn-sm">View Fees</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
