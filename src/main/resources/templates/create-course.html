<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Add Course</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark px-4">
    <a class="navbar-brand" href="#">Student Management System</a>
</nav>

<div class="container mt-4">
    <div class="col-md-6 offset-md-3">
        <div class="card p-4 mt-4">
            <h3 class="text-center mb-4">Add Course</h3>
            <form th:action="@{/courses}" th:object="${course}" method="post">
                <div class="form-group">
                    <label>Course Name</label>
                    <input type="text" th:field="*{courseName}" class="form-control" required>
                </div>
                <div class="form-group">
                    <label>Course Code</label>
                    <input type="text" th:field="*{courseCode}" class="form-control" required>
                </div>
                <div class="text-center">
                    <button type="submit" class="btn btn-primary px-4">Save</button>
                </div>
            </form>
            <p class="text-center mt-3">
                <a th:href="@{/courses}">Back to Course List</a>
            </p>
        </div>
    </div>
</div>

</body>
</html>
