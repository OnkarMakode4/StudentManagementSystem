<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Signup</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
</head>

<body class="bg-light">

<div class="container mt-5">
    <div class="col-md-5 offset-md-3">
        <div class="card p-4">

            <h3 class="text-center">Signup</h3>

            <form th:action="@{/signup}" method="post">

                <input type="text" name="username" class="form-control mb-3" placeholder="Username" required>
                <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
                <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>

                <select name="role" class="form-control mb-3" required>
                    <option value="" disabled selected>Select Role</option>
                    <option value="ADMIN">Admin (full access)</option>
                    <option value="VIEWER">Viewer (view only)</option>
                </select>

                <select name="securityQuestion" class="form-control mb-3" required>
                    <option value="" disabled selected>Select a Security Question</option>
                    <option value="What is your pet's name?">What is your pet's name?</option>
                    <option value="What is your city of birth?">What is your city of birth?</option>
                    <option value="What is your favorite teacher's name?">What is your favorite teacher's name?</option>
                </select>

                <input type="text" name="securityAnswer" class="form-control mb-3" placeholder="Answer to security question" required>

                <button class="btn btn-success btn-block">Signup</button>

            </form>

            <p class="text-center mt-2">
                Already have account? <a th:href="@{/login}">Login</a>
            </p>

        </div>
    </div>
</div>

</body>
</html>
