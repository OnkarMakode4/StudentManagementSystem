<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Grades</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark px-4">
    <a class="navbar-brand" href="#">Student Management System</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="btn btn-primary btn-sm" th:href="@{/students}">Back to Students</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="text-center" th:text="${student.firstName + ' ' + student.lastName + ' — Grades'}"></h3>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="row mb-4 mt-3">
        <div class="col-md-4">
            <div class="card text-white bg-primary text-center p-3">
                <h6>Average Marks</h6>
                <h3 th:text="${average}"></h3>
            </div>
        </div>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
            <tr>
                <th>Course</th>
                <th>Marks</th>
                <th>Grade</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="grade : ${grades}">
                <td th:text="${grade.course.courseName}"></td>
                <td th:text="${grade.marks}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${grade.grade == 'A+' or grade.grade == 'A'} ? 'badge-success' :
                                          (${grade.grade == 'B'} ? 'badge-primary' :
                                          (${grade.grade == 'C'} ? 'badge-warning' :
                                          (${grade.grade == 'D'} ? 'badge-secondary' : 'badge-danger')))"
                          th:text="${grade.grade}"></span>
                </td>
                <td>
                    <a th:href="@{/grades/delete/{gid}/student/{sid}(gid=${grade.id}, sid=${student.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this grade?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>

    <div class="card p-4 mt-3">
        <h5>Add Grade</h5>
        <form th:action="@{/grades/student/{id}(id=${student.id})}" method="post">
            <div class="form-row">
                <div class="col-md-4">
                    <select name="courseId" class="form-control" required>
                        <option value="" disabled selected>Select Course</option>
                        <option th:each="course : ${allCourses}"
                                th:value="${course.id}"
                                th:text="${course.courseName}"></option>
                    </select>
                </div>
                <div class="col-md-4">
                    <input type="number" name="marks" class="form-control" placeholder="Marks (0-100)" min="0" max="100" required>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-success">Add Grade</button>
                </div>
            </div>
        </form>
    </div>

</div>

</body>
</html>
