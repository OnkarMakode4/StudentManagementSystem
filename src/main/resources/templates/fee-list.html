<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Fee Management</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
<style>
    body { background-color: #f5f5f5; }
</style>
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark px-4">
    <a class="navbar-brand" href="#">Student Management System</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="btn btn-primary btn-sm" th:href="@{/students}">Back to Students</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="text-center"
        th:text="${student.firstName + ' ' + student.lastName + ' — Fee Records'}"></h3>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <!-- Summary cards -->
    <div class="row mt-3 mb-4">
        <div class="col-md-4">
            <div class="card text-white bg-primary text-center p-3 shadow">
                <h6>Total Due</h6>
                <h3 th:text="'₹ ' + ${totalDue}"></h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-success text-center p-3 shadow">
                <h6>Total Paid</h6>
                <h3 th:text="'₹ ' + ${totalPaid}"></h3>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card text-white bg-danger text-center p-3 shadow">
                <h6>Balance</h6>
                <h3 th:text="'₹ ' + ${totalBalance}"></h3>
            </div>
        </div>
    </div>

    <!-- Fee records table -->
    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
            <tr>
                <th>Term</th>
                <th>Amount Due</th>
                <th>Amount Paid</th>
                <th>Balance</th>
                <th>Payment Date</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="fee : ${fees}">
                <td th:text="${fee.term}"></td>
                <td th:text="'₹ ' + ${fee.amountDue}"></td>
                <td th:text="'₹ ' + ${fee.amountPaid}"></td>
                <td th:text="'₹ ' + ${fee.amountDue - fee.amountPaid}"></td>
                <td th:text="${fee.paymentDate != null ? fee.paymentDate : '—'}"></td>
                <td>
                    <span class="badge"
                          th:classappend="${fee.status == 'PAID'} ? 'badge-success' :
                                          (${fee.status == 'PARTIAL'} ? 'badge-warning' : 'badge-danger')"
                          th:text="${fee.status}"></span>
                </td>
                <td>
                    <a th:href="@{/fees/delete/{fid}/student/{sid}(fid=${fee.id}, sid=${student.id})}"
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this fee record?')">Delete</a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(fees)}">
                <td colspan="7" class="text-center text-muted">No fee records yet.</td>
            </tr>
        </tbody>
    </table>

    <!-- Add fee form -->
    <div class="card shadow p-4 mt-3">
        <h5>Add Fee Record</h5>
        <form th:action="@{/fees/student/{id}(id=${student.id})}" method="post">
            <div class="form-row">
                <div class="col-md-3">
                    <input type="text" name="term" class="form-control mb-2"
                           placeholder="Term (e.g. Term 1 2026)" required>
                </div>
                <div class="col-md-2">
                    <input type="number" name="amountDue" class="form-control mb-2"
                           placeholder="Amount Due" min="0" step="0.01" required>
                </div>
                <div class="col-md-2">
                    <input type="number" name="amountPaid" class="form-control mb-2"
                           placeholder="Amount Paid" min="0" step="0.01" required>
                </div>
                <div class="col-md-3">
                    <input type="date" name="paymentDate" class="form-control mb-2">
                </div>
                <div class="col-md-2">
                    <button type="submit" class="btn btn-success btn-block">Add</button>
                </div>
            </div>
        </form>
    </div>

</div>

</body>
</html>
