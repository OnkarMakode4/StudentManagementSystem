<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Attendance</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-md bg-dark navbar-dark px-4">
    <a class="navbar-brand" href="#">Student Management System</a>
    <div class="collapse navbar-collapse">
        <ul class="navbar-nav ml-auto">
            <li class="nav-item">
                <a class="btn btn-primary btn-sm" th:href="@{/students}">Back to Students</a>
            </li>
        </ul>
    </div>
</nav>

<div class="container mt-4">

    <h3 class="text-center" th:text="${student.firstName + ' ' + student.lastName + ' — Attendance'}"></h3>

    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="row mb-4 mt-3">
        <div class="col-md-3">
            <div class="card text-white bg-success text-center p-3">
                <h6>Present</h6>
                <h3 th:text="${present}"></h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-danger text-center p-3">
                <h6>Absent</h6>
                <h3 th:text="${absent}"></h3>
            </div>
        </div>
        <div class="col-md-3">
            <div class="card text-white bg-info text-center p-3">
                <h6>Attendance %</h6>
                <h3 th:text="${percentage + '%'}"></h3>
            </div>
        </div>
    </div>

    <table class="table table-bordered table-striped">
        <thead class="thead-dark">
            <tr>
                <th>Date</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="record : ${records}">
                <td th:text="${record.date}"></td>
                <td>
                    <span th:if="${record.status == 'PRESENT'}" class="badge badge-success">Present</span>
                    <span th:if="${record.status == 'ABSENT'}" class="badge badge-danger">Absent</span>
                </td>
                <td>
                    <a th:href="@{/attendance/delete/{id}(id=${record.id})}" class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this record?')">Delete</a>
                </td>
            </tr>
        </tbody>
    </table>

</div>

</body>
</html>
